name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            cmake libffi-dev libssl-dev build-essential

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.36
          pip install buildozer==1.5.0

      - name: Install Android SDK command-line tools
        run: |
          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK_DIR/cmdline-tools
          cd $SDK_DIR/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip
          mv cmdline-tools latest
          rm cmdtools.zip
          # Cria estrutura no caminho antigo que o buildozer/p4a procura
          mkdir -p $SDK_DIR/tools/bin
          cp -r $SDK_DIR/cmdline-tools/latest/bin/* $SDK_DIR/tools/bin/
          mkdir -p $SDK_DIR/tools/lib
          cp -r $SDK_DIR/cmdline-tools/latest/lib/* $SDK_DIR/tools/lib/ 2>/dev/null || true
          ls -la $SDK_DIR/tools/bin/

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p $HOME/.android
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          printf "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          echo "601085b94cd77f0b54ff86406957099ebe79c4d" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-arm-dbt-license
          echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97" > $HOME/.buildozer/android/platform/android-sdk/licenses/google-gdk-license

      - name: Build APK
        run: |
          yes | buildozer android debug 2>&1 | tee build_log.txt
          echo "===== Conteúdo da pasta bin ====="
          ls -la bin/ || echo "Pasta bin não existe"

      - name: Show error lines
        if: always()
        run: |
          echo "===== Última ocorrência de 'Error:' com contexto ====="
          grep -n "Error:" build_log.txt | tail -5
          echo ""
          echo "===== 80 linhas antes da palavra 'Command failed' ====="
          grep -n "Command failed" build_log.txt | tail -1 | cut -d: -f1 | xargs -I{} bash -c 'start=$(({}-80)); [ $start -lt 1 ] && start=1; sed -n "${start},{}p" build_log.txt'

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gestao-estoque-apk
          path: bin/*.apk
          if-no-files-found: warn
