name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            cmake libffi-dev libssl-dev build-essential

      - name: Install Buildozer
        run: |
          pip install --upgrade buildozer cython virtualenv

      - name: Accept Android SDK licenses
        run: |
          mkdir -p $HOME/.buildozer/android/platform
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Pre-accept licenses (fallback method)
        run: |
          mkdir -p ~/.android
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          echo "601085b94cd77f0b54ff86406957099ebe79c4d" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-arm-dbt-license

      - name: Build APK
        run: |
          yes | buildozer android debug

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gestao-estoque-apk
          path: bin/*.apk
          if-no-files-found: warn
